name: Python-Selenium autotests

permissions:
  contents: write

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: Choose target
        required: true
        default: all_tests
        type: choice
        options:
          - all_tests
          - basket_tests
          - guest_tests
          - login_tests
          - main_page_tests
          - product_page_tests
          - regression_tests
          - smoke_tests
          - user_tests

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            uv run pytest
            exit 0
          fi
          
          case "${{ github.event.inputs.deployment_target }}" in
            all_tests)
              uv run pytest
              ;;
          
            basket_tests)
              uv run pytest -m basket
              ;;
          
            guest_tests)
              uv run pytest -m guest
              ;;
          
            login_tests)
              uv run pytest -m login
              ;;
          
            main_page_tests)
              uv run pytest -m main_page
              ;;
          
            product_page_tests)
              uv run pytest -m product_page
              ;;
          
            regression_tests)
              uv run pytest -m regression
              ;;
          
            smoke_tests)
              uv run pytest -m smoke
              ;;
          
            user_tests)
              uv run pytest -m user
              ;;
          
            *)
              echo "Unknown test group"
              exit 1
              ;;
          esac

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: allure-results
          path: allure-results
          retention-days: 1

  publish-report:
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Download Allure results
        uses: actions/download-artifact@v8.0.1
        with:
          name: allure-results
          path: allure-results

      - name: Checkout gh-pages history
        uses: actions/checkout@v6.0.3
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: step-security/allure-report-action@v1.13.2
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Allure report
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          mkdir deploy
          cp -r allure-history/* deploy/
          
          cd deploy
          git init
          git checkout --orphan gh-pages
          git add .
          git commit -m "Deploy Allure report"
          
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin gh-pages --force
